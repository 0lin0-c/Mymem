<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>设置 - AI 助手</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <div class="settings-card">
            <h1>LLM 配置</h1>
            <p class="settings-desc">配置你的 LLM 服务，保存后即可开始使用</p>

            <form id="llmSettingsForm">
                <div class="form-group">
                    <label for="llm_provider">LLM 提供商</label>
                    <select id="llm_provider">
                        <option value="openai">OpenAI</option>
                        <option value="deepseek">DeepSeek</option>
                        <option value="qwen">通义千问 (Qwen)</option>
                        <option value="glm">智谱 GLM</option>
                        <option value="anthropic">Anthropic (Claude)</option>
                        <option value="custom">自定义 (OpenAI 兼容)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="llm_base_url">API Base URL <span class="optional">(可选)</span></label>
                    <input type="text" id="llm_base_url" placeholder="如：https://api.deepseek.com/v1">
                    <span class="hint">留空使用默认地址</span>
                </div>

                <div class="form-group">
                    <label for="llm_api_key">API Key</label>
                    <input type="password" id="llm_api_key" placeholder="请输入 API Key">
                    <span class="error-msg"></span>
                </div>

                <div class="form-group">
                    <label for="llm_model">模型名称</label>
                    <input type="text" id="llm_model" placeholder="如：gpt-4o、deepseek-chat">
                    <span class="hint">常用：gpt-4o、gpt-3.5-turbo、deepseek-chat、qwen-plus</span>
                    <span class="error-msg"></span>
                </div>

                <button type="submit" class="btn-primary btn-full">保存并预热</button>
            </form>

            <div id="warming_up" class="hidden">
                <p>正在预热 LLM 连接...</p>
                <div class="spinner"></div>
            </div>

            <div id="success_msg" class="hidden success-msg">
                <p>✅ 配置成功！<a href="chat.html">开始对话</a></p>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            initSettingsPage();
        });
    </script>
</body>
</html>

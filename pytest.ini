# Pytest 配置文件
[pytest]
# 异步测试支持
asyncio_mode = auto
asyncio_default_fixture_loop_scope = session
asyncio_default_test_loop_scope = session

# 测试发现路径
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 标记定义
markers =
    integration: 真实 API 调用的集成测试
    slow: 运行较慢的测试
    vector: 涉及向量计算的测试
    converted_data: converted_data 数据集驱动评估
    storage_eval: converted_data 存储链路评估
    retrieval_eval: converted_data 检索链路评估
    assistant_eval: converted_data 端到端回答评估

# 默认命令行选项
addopts = -v --tb=short

# 忽略警告
filterwarnings =
    ignore::DeprecationWarning
    ignore::UserWarning

# 日志配置
log_cli = false
log_cli_level = INFO
